title: Same-Day Focaccia
section: Baking
created_at: '2025-11-02'
tags:
- Bread
equipment: []
prepTime: PT3H
cookingTime: PT25M
source:
  type: url
  url: https://www.instagram.com/_lacebakes_/reel/DJlzaYiIsII/?hl=en
  description: Lacey Ostermann
ingredients:
- ingredients:
  - quantity: 500g
    ingredient: Plain Flour
    notes: 12% protein content or higher
  - quantity: 420ml
    ingredient: Water
    notes: Start with 390ml water. Add in more water if needed.
  - quantity: 6g
    ingredient: Instant Yeast
  - quantity: 5g
    ingredient: Honey
  - quantity: 15ml
    ingredient: Extra Virgin Olive Oil
  - quantity: 10g
    ingredient: Salt
steps:
- steps:
  - text: Whisk together warm water, olive oil, honey and yeast.
  - text: Stir in bread flour and salt.
  - text: Cover and rest at room temp for 15 minutes.
  - text: Stretch & fold the dough - do this about 8 times around the bowl.
  - text: Cover again, and rest at room temp for 15 minutes.
  - text: Repeat the the stretch & folds once more, cover and proof at room temp for
      1-1.5 hours.
  - text: Line 9"x13" metal baking tray with nonstick parchment paper. (You can use
      a larger tray if you want it thinner/crispier.) Coat the paper with 3 tablespoons
      extra virgin olive oil.
  - text: Transfer the dough to the tray and fold as shown in tutorial. Cover and
      proof at room temperature for 1-1.5 hours.
  - text: Preheat oven to 220C/430F, place oven rack in lowest position.
  - text: Assemble the focaccia
    substeps:
    - text: Spread dough to edges of the pan
    - text: Scatter over rosemary (if using)
    - text: Drizzle with olive oil
    - text: Dimple the dough.
    - text: Add any additional toppings of your choice.
    - text: Add flaky sea salt.
  - text: Bake for 18-24 minutes on the lowest rack to help the bottom of the bread
      to crisp up.
  - text: Transfer to a cooling rack, wait at least 15 minutes and then cut in and
      enjoy!
