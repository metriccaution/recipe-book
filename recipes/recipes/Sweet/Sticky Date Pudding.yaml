identifier: 429aa426-1f17-40d7-b8e3-fd99cbad1492
title: Sticky Date Pudding
section: Sweet
created_at: '2025-03-04'
tags:
- Eggs
equipment:
- 20cm Square tin
- Food processor
- Oven
serves: 8
prepTime: PT15M
cookingTime: PT1H
source:
  type: url
  url: https://www.donnahay.com.au/recipes/sweets/slices/sticky-date-pudding-with-butterscotch-sauce
  description: Donna Hay
ingredients:
- group: The Cake
  ingredients:
  - quantity: 340g
    ingredient: Fresh Dates
    notes: Seeded and chopped
  - quantity: 375ml
    ingredient: Water
    notes: Boiling
  - quantity: 1.5 teaspoons
    ingredient: Bicarbonate of Soda
  - quantity: 150g
    ingredient: Unsalted Butter
    notes: Chopped
  - quantity: 175g
    ingredient: Brown Sugar
  - quantity: '3'
    ingredient: Eggs
- group: butterscotch sauce
  ingredients:
  - quantity: 80g
    ingredient: Unsalted Butter
    notes: Chopped
  - quantity: 265g
    ingredient: Brown Sugar
  - quantity: 250ml
    ingredient: Single Cream
steps:
- steps:
  - text: Preheat oven to 160C.
  - text: Place the dates, water and bicarbonate of soda in a medium bowl and set
      aside for 5 minutes.
  - text: Place the date mixture, butter, sugar and eggs in a food processor and process
      until well combined.
  - text: Sift the flour over the date mixture and process until smooth.
  - text: Pour the mixture into a lightly greased 20cm square cake tin lined with
      non-stick baking paper and cook for 55-60 minutes or until cooked when tested
      with a skewer.
  - text: Allow to cool in the tin for 10 minutes before turning out onto a wire rack.
  - text: To make the butterscotch sauce, place the butter and sugar in a medium saucepan
      over high heat and stir until the sugar has dissolved.
  - text: Gradually add the cream, stirring to combine.
  - text: Bring to the boil and cook for 6-8 minutes or until thickened slightly.
  - text: Slice the sticky date pudding into squares and serve warm or at room temperature,
      drizzled with the butterscotch sauce.
