identifier: 046e5631-eb9a-49ce-b50b-6b45322d185f
title: Chocolate Mousse
section: Sweet
created_at: '2024-09-27'
tags:
- Alcohol
- Chocolate
- Eggs
- Family Classics
equipment:
- 4x glasses to serve
- Bowl
- Fridge
- Saucepan and heatproof bowl
- Whisk
prepTime: PT20M
cookingTime: PT10M
source:
  type: described
  description: Dad
ingredients:
- group: Mousse
  ingredients:
  - quantity: 175g
    ingredient: Plain Chocolate
    notes: broken
  - quantity: 2 tablespoon
    ingredient: Black Coffee
  - quantity: '4'
    ingredient: Eggs
    notes: separated
  - quantity: 1 tablespoons
    ingredient: Rum / Brandy
- group: To Finish
  ingredients:
  - quantity: 150ml
    ingredient: Double Cream
  - quantity: 1 tablespoon
    ingredient: Dark Chocolate
    notes: grated
steps:
- steps:
  - text: Prepare all the ingredients - otherwise there's too much to do too fast.
  - text: Melt the chocolate (over water) & add coffee until melted.
  - text: Remove from the heat & let cool for 1-2 minutes.
  - text: Beat the yolks & gradually stir into the chocolate.
  - text: Stir in rum / brandy.
  - text: Beat the egg whites until stiff.
  - text: Fold the egg white into the chocolate mixture.
  - text: Put into 4 glasses.
  - text: Whip the cream and add a sprinkle of grated chocolate.
