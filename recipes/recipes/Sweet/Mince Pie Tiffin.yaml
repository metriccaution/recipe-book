title: Mince Pie Tiffin
section: Sweet
created_at: '2026-01-31'
tags:
- Almond
- Chocolate
- Nuts
equipment: []
prepTime: PT1H
cookingTime: PT10M
source:
  type: described
  description: Abel & Cole
description: Makes about 20 squares. The tiffin will keep in the fridge for up to
  7 days.
ingredients:
- ingredients:
  - quantity: 150g
    ingredient: Milk Chocolate
  - quantity: 125g
    ingredient: Butter
  - quantity: 25g
    ingredient: Cocoa Powder
  - quantity: 100g
    ingredient: Agave Syrup
  - quantity: '2'
    ingredient: Clementines
  - quantity: 50g
    ingredient: Flaked Almonds
  - quantity: 50g
    ingredient: Dried Cranberries
  - quantity: 300g
    ingredient: Mince Pies
  - quantity: 30g
    ingredient: White Chocolate
steps:
- steps:
  - text: Half-fill and boil your kettle.
  - text: Line the base and sides of a 23cm x 17cm baking dish, or a square 20cm cake
      tin with baking paper.
  - text: Chop the chocolate. Dice the butter. Scoop them into a heatproof bowl and
      add the agave syrup and cocoa powder.
  - text: Finely grate in the zest from 2 clementines.
  - text: Squeeze in the clementine juice.
  - text: Quarter-fill a pan with hot water and set the bowl in the pan so it rests
      above the water, but doesn't touch it. Place on a medium heat and bring the
      water to a simmer.
  - text: When it starts to steam, turn the heat down very low and warm for 3-5 mins,
      stirring occasionally till the chocolate and butter have melted and you have
      a smooth mixture. Take the pan off the heat.
  - text: Tip the flaked almonds into a dry frying pan and toast, stirring often,
      for 2-3 mins till golden brown.
  - text: Add them and the dried cranberries to the melted chocolate.
  - text: Crumble in the mince pies, breaking them into small chunks. Stir till everything
      is coated and combined.
  - text: Roughly chop the white chocolate and melt it in a bowl set over a pan of
      hot water, the same way you melted the tiffin mix.
  - text: To decorate the tiffin, Drizzle spoonfuls of the white chocolate over the
      tiffin.
  - text: Place in the fridge for 1 hr.
  - text: To serve, lift the tiffin and paper out of the dish or tin and then peel
      off the paper.
  - text: Slice into around 18-24 squares.
