title: Chocolate Casserole Pudding
section: Sweet
created_at: '2024-09-27'
tags:
- Eggs
- Family Classics
equipment:
- Casserole dish
- Oven
- Whisk
serves: 4
prepTime: PT15M
cookingTime: PT45M
source:
  type: book
  isbn: '9780600313625'
  description: Marguerite Patten's All Colour Cookery
ingredients:
- ingredients:
  - quantity: 75g
    ingredient: Butter
    notes: Soft
  - quantity: 75g
    ingredient: Sugar
  - quantity: '3'
    ingredient: Eggs
  - quantity: 75g
    ingredient: Self Raising Flour
    notes: Sieved
  - quantity: 25g
    ingredient: Cocoa Powder
  - quantity: 275ml
    ingredient: Milk
steps:
- steps:
  - text: Pre-heat oven to 180C
  - text: Grease a casserole dish
  - text: Split egg yolks from whites
  - text: Cream the butter and sugar until soft and light
  - text: 'Gradually beat in:'
    substeps:
    - text: Egg yolks
    - text: Flour
    - text: Cocoa
    - text: Milk
  - text: Beat egg whites to stiff peaks
  - text: Gently fold in egg whites
  - text: Put into casserole dish, placed into a tin of water
  - text: Cook for 45 minutes
