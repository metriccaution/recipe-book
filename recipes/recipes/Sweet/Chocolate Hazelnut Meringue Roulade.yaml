identifier: af155758-15a7-4e3a-bacd-1fa326d7b7ac
title: Chocolate Hazelnut Meringue Roulade
section: Sweet
created_at: '2024-09-27'
tags:
- Chocolate
- Eggs
- Family Classics
- Nuts
equipment:
- 2 x Baking tray
- Baking parchment
- Food processor
- Large bowl
- Oven
- Saucepan and heatproof bowl
- Whisk
serves: 10
prepTime: PT30M
cookingTime: PT20M
source:
  type: book
  isbn: '9780563488187'
  description: Delia's Vegetarian Collection
ingredients:
- ingredients:
  - quantity: 200g
    ingredient: Dark Chocolate
    notes: 75% cocoa solids, broken into small pieces
  - quantity: 110g
    ingredient: Hazelnuts
  - quantity: '4'
    ingredient: Eggs
    notes: Large, just the whites
  - quantity: 225g
    ingredient: Caster Sugar
  - quantity: 500ml
    ingredient: Double Cream
steps:
- title: Exterior
  steps:
  - text: Prepare a baking tray 25 x 35cm - lightly oil and line with baking parchment
      to stand 2.5cm proud of the tray,
  - text: Preheat oven to 190C,
  - text: Toast the hazelnuts on a baking tray on the top shelf of the oven for 8
      minutes,
  - text: Allow to cool and grind in a food processor (finely chopped but not powder),
  - text: Whisk the egg whites in a large bowl until they form soft peaks,
  - text: Whisk in the sugar a little at a time,
  - text: With a metal spoon, fold in the hazelnuts and spread in the prepared tin,
  - text: Bake in the oven for 20 minutes,
  - text: Cool and turn out onto a piece of baking parchment slightly larger than
      the roulade (this will need some space). Gently pull away the lining paper,
- title: Filling
  steps:
  - text: Melt the chocolate in the heatproof bowl over simmering water (bowl does
      _not_ touch the water),
  - text: Remove the bowl from the heat and allow the chocolate to cool,
  - text: Whip the cream and divide between 2 bowls,
  - text: Fold all bt 4 tablespoons of the chocolate (reserved for decoration) into
      on of the bowls of whipped cream,
  - text: Spread the chocolate mixture evenly over the roulade, to a distance within
      0.5cm of the edge,
  - text: Spread the whipped cream over the chocolate mixture,
- title: Assembly
  steps:
  - text: With the long-size of the roulade towards you and using the paper to assist
      you, roll up the roulade into a log-shape (it will probably crack during this.)
  - text: With the seam at the base, drizzle the remaining chocolate over the top.
  - text: Move onto a serving dish and put into the fridge for at least 15 minutes
      before serving.
