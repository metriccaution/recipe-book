title: Marzipan
section: Component
created_at: '2024-09-27'
tags:
- Almond
- Eggs
- Family Classics
- Nuts
equipment:
- Knife
- Large bowl
prepTime: PT15M
source:
  type: url
  url: https://web.archive.org/web/20140602001452/http://www.naturallygoodfood.co.uk/blog/2013/10/make-your-own-organic-marzipan/
  description: Naturally good food website
ingredients:
- ingredients:
  - quantity: 175g
    ingredient: Caster Sugar
  - quantity: 280g
    ingredient: Icing Sugar
    notes: Sifted, plus extra for kneading and rolling.
  - quantity: 450g
    ingredient: Ground Almonds
  - quantity: 5ml
    ingredient: Vanilla Extract
  - quantity: '2'
    ingredient: Eggs
    notes: beaten
  - quantity: 1/2 teaspoon
    ingredient: Lemon Juice
steps:
- steps:
  - text: Mix the sugars and almonds in a large bowl, then rub in the vanilla seeds
      (or extract) until even.
  - text: Make a well in the middle, then tip in the eggs and lemon juice.
  - text: Cut the wet ingredients into the dry with a cutlery knife. Dust the surface
      with icing sugar, then knead the marzipan briefly with your hands to a smooth
      dough. (Don't overdo the kneading, as the paste can get greasy.)
  - text: Add a bit more icing sugar if it seems too wet.
  - text: Shape into a ball, then wrap and keep in a cool place until ready to cover
      your cake.
