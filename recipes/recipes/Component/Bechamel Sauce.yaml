identifier: 1df613fc-07ad-459f-b244-54cb83dc5445
title: Bechamel Sauce
section: Component
created_at: '2024-09-27'
tags:
- Sauce
equipment:
- Hob
- Saucepan
prepTime: PT5M
cookingTime: PT10M
source:
  type: described
  description: One of Mum's recipe books, with adjustments.
ingredients:
- ingredients:
  - quantity: 50g
    ingredient: Butter
  - quantity: 50g
    ingredient: Wholemeal Flour
  - quantity: 275ml
    ingredient: Milk
  - quantity: 275ml
    ingredient: Stock
  - quantity: 1 tsp
    ingredient: Mustard Powder
    notes: Optional
  - quantity: Pinch
    ingredient: Salt / Black Pepper
    notes: To taste
steps:
- steps:
  - text: Melt the butter in a saucepan.
  - text: Off the heat stir in the flour and cook for 1-2 minutes, stirring continuously.
  - text: Slowly stir in the milk and stock until it's evenly blended.
  - text: Bring to the boil, reduce heat and simmer for 2-3 minutes.
