ingredients:
- ingredients:
  - quantity: 3 tbsp
    ingredient: Tahini
  - quantity: 3 tbsp
    ingredient: Apple Cider Vinegar
  - quantity: 3 tsp
    ingredient: Miso
  - quantity: 2.5cm piece
    ingredient: Ginger
    notes: Finely grated
steps:
- steps:
  - text: Put the ingredients in a bowl with 3 tablespoons of cold water and mix vigorously.
  - text: Add a few more tablespoons of water if necessary to reach a consistency
      similar to single cream.
  - text: Season with a pinch of pepper.
  - text: Store in an airtight container in the fridge for up to 2 weeks,
