title: Sauerkraut Dressing
section: Component
created_at: '2025-11-24'
tags:
- Fermented
- Sauce
equipment: []
prepTime: PT5M
source:
  type: book
  isbn: '9781787335233'
  page: 266
  description: The Food For Life Cookbook
ingredients:
- ingredients:
  - quantity: 30g
    ingredient: Basil
  - quantity: 3 tbsp
    ingredient: Sauerkraut
    notes: Plus 3 tbsp brine
  - quantity: 2 tbsp
    ingredient: Olive Oil
steps:
- steps:
  - text: Put all the ingredients into a blender with a pinch of salt and pepper and
      blitz until smooth.
  - text: Thin a little with water if necessary.
  - text: The dressing will keep in an airtight container in the fridge for up to
      1 week.
