ingredients:
- ingredients:
  - quantity: 2 x 400g can
    ingredient: Butter Beans
  - quantity: 2 tbsp
    ingredient: Olive Oil
  - quantity: '1'
    ingredient: Onions
  - quantity: 3 cloves
    ingredient: Garlic
  - quantity: 700g
    ingredient: Mushrooms
  - quantity: 1.5 tsp
    ingredient: Dijon Mustard
  - quantity: 1 tsp
