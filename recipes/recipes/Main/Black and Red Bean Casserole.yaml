steps:
- title: Tomato Sauce
  steps:
  - text: Fry the onions in the oil until transparent.
  - text: Add the tinned tomatoes, crush with a spoon
  - text: Add the garlic.
  - text: Add the basil, salt and pepper, and cook gently for 25 minutes, until the
      sauce is thick.
  - text: Remove the basil, replace with fresh, chopped leaves.
- title: Casserole
  steps:
  - text: Heat the oil in a pan and saute the onion until brown
  - text: Add the garlic about halfway through cooking.
  - text: Add the salt, pepper, paprika, fresh chilli and the carrots. Cook until
      _al dente_.
  - text: Add the drained kidney beans, and tomato sauce.
  - text: Simmer until reduced.
  - text: Add in the sweetcorn and cook for a few minutes.
  - text: Adjust the seasoning with Tabasco, salt, and pepper.
  - text: Continue to simmer for 6-7 minutes, taking care not to dry it out.
  - text: Remove from the heat, and add coriander.
- title: Lime and Coriander Cream
  steps:
  - text: Mix the sour cream or yoghurt with the second quantity of coriander, as
      well as the lime juice and salt to taste.
- title: Guacamole
  steps:
  - text: Peel the avocados, remove the stones and dice the contents.
  - text: Add the avocado, water, garlic and oil to a food processor, blend smooth.
  - text: Add to a bowl and add the tomatoes.
  - text: Grind the pepper over the surface.
