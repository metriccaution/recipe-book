steps:
- steps:
  - text: Peel & slice the onion. Deseed & chop the chilli. Peel & chop the garlic.
      Finely slice the pickle.
  - text: Shred the coconut, and put it in a heatproof jug, set the kettle to boil.
  - text: Dry-roast the spices for 2-3 minutes, tossing to avoid them burning, then
      grind them to a powder.
  - text: Fry the onions on a high heat until brown.
  - text: Turn the heat down, and add the chilli, garlic, ginger, lime pickle, and
      the spices. Mix well.
  - text: Add 600ml of boiling water to the coconut, and mix well.
  - text: Stir the lentils into the pan, add the lime zest, and coconut. Turn the
      heat down once it starts to simmer.
  - text: Put the lid on, and simmer for 45 minutes.
  - text: 10 minutes before the lentils are done, boil the eggs for 6-7 minutes.
  - text: Run the eggs under the cold tap, then once they're cool enough, peel them,
      then half them.
  - text: Serve the curry, topped with the eggs.
