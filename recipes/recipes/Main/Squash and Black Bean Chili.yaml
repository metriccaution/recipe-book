- Preserved Beans
- Stew
- Tomato
equipment:
- Baking Tray
- Large frying pan
- Lemon squeezer
- Pre-heated oven
serves: 1
prepTime: PT20M
cookingTime: PT1H
source:
  type: book
  isbn: '9780993215506'
  description: Riverford Autumn and Winter Veg
ingredients:
- ingredients:
  - quantity: '1'
    ingredient: Squash
    notes: Medium-size, or 1 Large Onion or Smallish Crown Prince Squash
  - quantity: 2 tablespoons
    ingredient: Olive Oil
    notes: for roasting
  - quantity: '1'
    ingredient: Onions
    notes: large, chopped
  - quantity: 4 sticks
    ingredient: Celery
    notes: finely chopped
  - quantity: '1'
    ingredient: Red Pepper
    notes: deseed and chopped
  - quantity: '1'
    ingredient: Green Pepper
    notes: deseeded and chopped
  - quantity: 3 cloves
    ingredient: Garlic
    notes: crushed
  - quantity: 1-2 tablespoons
    ingredient: Dried Chillis
  - quantity: 1 tablespoon
    ingredient: Marjoram
  - quantity: '2'
    ingredient: Bay Leaves
  - quantity: 2 teaspoons
    ingredient: Cumin Seeds
    notes: Ground
  - quantity: 400g can
    ingredient: Chopped Tomatoes
  - quantity: 2 400g can
    ingredient: Black Beans
    notes: rinsed and drained
  - quantity: '1'
    ingredient: Lime
    notes: Juiced, approx 2 tablespoons
  - quantity: Small handful
    ingredient: Fresh Coriander
    notes: finely chopped
  - quantity: Pinch
    ingredient: Salt / Black Pepper
  - quantity: 100g
    ingredient: Cheddar Cheese
    notes: Grated (optional)
  - quantity: 142 ml
    ingredient: Sour Cream
    notes: optional
steps:
- steps:
  - text: "Pre-heat the oven to 180\xB0C, roast the squash (whole or in chunks),"
  - text: Heat the oil in a large frying pan over a medium-high heat.
  - text: Add onions and celery. Reduce the heat to medium and cook, stirring occasionally
      for about 10 minutes until soft,
  - text: Add the peppers and continue cooking for a further 10 minutes,
  - text: Stir in the garlic and cook for another minute.
  - text: Add the chili, 1-2 teaspoons of salt, 1 teaspoon of black pepper, the herbs
      and cumin.
  - text: Give everything a good mix then add the tomatoes.
  - text: Simmer uncovered for about 30 minutes.
  - text: Stir the beans and continue to simmer for a further 10 minutes.
  - text: Remove the bay leaves.
  - text: Stir the lime juice and coriander.
  - text: If using roast squash, add it now, heat through then serve.
  - text: If stuffing a whole squash, fill each roasted squash half with the filling
      mixture.
  - text: Top with grated cheese or soured cream (or both).
