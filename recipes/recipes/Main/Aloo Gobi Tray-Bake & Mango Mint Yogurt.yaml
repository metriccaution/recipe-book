title: Aloo Gobi Tray-Bake & Mango Mint Yogurt
section: Main
created_at: '2025-10-03'
tags:
- Cauliflower
- Onion
- Potato
- Preserved Beans
- Tomato
equipment: []
serves: 2
prepTime: PT20M
cookingTime: PT40M
source:
  type: described
  description: Riverford
ingredients:
- ingredients:
  - quantity: 250g
    ingredient: Potatoes
  - quantity: 1 small
    ingredient: Cauliflower
  - quantity: '1'
    ingredient: Red Onions
  - quantity: '1'
    ingredient: Fresh Chilli
  - quantity: 1/2 400g can
    ingredient: Black Beans
  - quantity: 400ml
    ingredient: Passata
  - quantity: Handful
    ingredient: Mint
  - quantity: Handful
    ingredient: Fresh Coriander
  - quantity: 1 pot
    ingredient: Natural Yoghurt
  - quantity: 60g
    ingredient: Mango Chutney
  - quantity: '1'
    ingredient: Lemon
steps:
- steps:
  - text: "Preheat your oven to 190\xB0C fan/Gas 6-7."
  - text: Scrub and chop the potatoes into wedges. Chop enough cauliflower to your
      liking into medium-sized florets.
  - text: Peel and chop the onion into wedges. Peel and finely grate or chop the garlic.
      Slice the chilli into thin rings.
  - text: Drain and rinse the black beans.
  - text: Toss the potatoes and onion ina large roasting tin with just enough oil
      to coat and season with salt and pepper. Roast for 15 minutes.
  - text: After 15 minutes, toss in the cauliflower, garlic, spice pot and half the
      chilli, flipping over the onion and potatoes as you do so. Roast for a further
      15 minutes.
  - text: Toss with the black beans and passata. Rinse out the passata jar a with
      a little splash of water; add that.
  - text: Bake for a further 10 minutes,
  - text: Shred 2 tbsp worth of mint leaves.
  - text: In a small bowl, mix the mint with the yogurt and mango chutney.
  - text: Check the aloo gobi seasoning for salt and pepper and add lemon juice to
      taste. Add a splash of water to loosen, to serve, if you like.
  - text: Chop the coriander (use the stalks too). Scatter it over the aloo gobi,
      along with extra chilli if you like, and serve with the mango mint yogurt.
