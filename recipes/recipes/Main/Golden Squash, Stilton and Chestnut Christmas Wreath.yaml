title: Golden Squash, Stilton and Chestnut Christmas Wreath
section: Main
created_at: '2024-09-27'
tags:
- Chestnuts
- Christmas
- Complex
- Eggs
- Nuts
- Onion
equipment: []
serves: 6
prepTime: PT1H
cookingTime: PT40M
source:
  type: described
  description: Abel & Cole
ingredients:
- ingredients:
  - quantity: '1'
    ingredient: Squash
  - quantity: '3'
    ingredient: Onions
  - quantity: '1'
    ingredient: Cinnamon Stick
  - quantity: 4 cloves
    ingredient: Garlic
  - quantity: '1'
    ingredient: Clementine
  - quantity: 200g
    ingredient: Cooked Chestnuts
  - quantity: 200g
    ingredient: Baby Spinach
  - quantity: 50g
    ingredient: Butter
  - quantity: 600g
    ingredient: Shortcrust Pastry
  - quantity: 200g
    ingredient: Stilton
  - quantity: '2'
    ingredient: Eggs
  - quantity: 1 tbsp
    ingredient: Sesame Seeds
  - quantity: 2 tbsp
    ingredient: Olive Oil
  - quantity: 1 tbsp
    ingredient: Plain Flour
steps:
- title: Prepare the _squash_, and _onions_
  steps:
  - text: Cube the squash
    substeps:
    - text: Trim the top and bottom off.
    - text: Peel it.
    - text: Half it.
    - text: Scoop out the seeds and membrane.
    - text: Cut into 2cm chunks.
  - text: Peel and slice the onions.
  - text: Pour 2 tbsp of oil into a large pan, on a low heat, add the _squash_, _onions_,
      and _cinnamon stick_. Put a lid on and cook for 15-20 minutes, stirring occasionally.
      Add water if it ever looks dry.
- title: While the squash is cooking.
  steps:
  - text: Peel and grate the _garlic_
  - text: Grate the _clementine_ skin and squeeze the juice into a bowl.
  - text: Once the _squash_ is soft, add the _garlic_.
  - text: Crumble the _chestnuts_ into the squash, and cook for 5 more minutes, with
      the lid on.
- title: Next.
  steps:
  - text: Add the _spinach_, the _clementine_ juice and zest, 50g of the _butter_,
      and stir.
  - text: Stir until the spinach wilts
  - text: Move the mixture to a bowl and leave to cool.
  - text: Take the _pastry_ from the fridge, and leave to come up to room temperature
      for 15 minutes.
  - text: Prepare the filling.
    substeps:
    - text: Remove the cinnamon stick.
    - text: Crumble in the stilton.
    - text: Whisk an _egg_ and add it to the mixture.
    - text: Mix well.
    - text: Break the remaining egg into a bowl, whisk, and put to the side.
  - text: Flour the worktop, then roll the pastry into 40cm by 10cm rectangles.
  - text: Prepare the pastry.
    substeps:
    - text: Line a large tray, and move one pastry rectangle onto it
    - text: Place the other next to it.
    - text: Join the narrow ends of the pastry together with a little water to form
        one long rectangle.
  - text: Form the wreath.
    substeps:
    - text: Spoon the cool mixture down the middle of the rectangle - you might not
        need it all.
    - text: Brush one of the long edges with the beaten egg.
    - text: Fold the other edge across, and press it to the beaten egg firmly to seal
        it. (It should look like a large sausage roll).
    - text: Carefully bring the two ends together on the tray.
    - text: Join the ends as best as possible.
    - text: Cool in the fridge for 20 minutes.
    - text: Keep the beaten egg.
  - text: Preheat the oven to 200C
  - text: Remove the wreath from the fridge and brush it down with egg,
  - text: scatter the sesame seeds on top.
  - text: Cook for 30-40 minutes, until deep golden-brown. (You can bake extra filling
      alongside in a dish).
  - text: Move the wreath onto a plate and serve straight away.
