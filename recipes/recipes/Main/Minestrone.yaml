steps:
- steps:
  - text: Heat the oil in a pan and fry the onion until transparent.
  - text: Add the tomatoes, salt and pepper, and fry for another 5 minutes.
  - text: Add the potatoes and half the stock.
  - text: Bring to the boil, and simmer until the potatoes are tender.
  - text: Add the broad beans, peas, mushrooms, green bean, courgettes, cauliflower,
      and the remaining stock.
  - text: Simmer for about 25 minutes until the vegetables are very tender.
  - text: Add the cannellini beans and heat through.
  - text: Add the parsley
  - text: Simmer for 3-4 minutes, stirring (add more stock or water if its too thick).
  - text: Bring to the boil, add the pasta, and boil for 10 minutes.
  - text: Serve with freshly grated parmesan.
