identifier: e0b723d0-50e5-4194-99c5-e58c90ae1abe
title: Cheesy Potato and Cauliflower Bake
section: Main
created_at: '2024-09-27'
tags:
- Cauliflower
- Cheese
- Eggs
- Onion
- Potato
equipment: []
prepTime: PT15M
cookingTime: PT1H
source:
  type: book
  isbn: '9781909881839'
  page: 83
  description: Veggie Comfort Food (National Trust)
ingredients:
- ingredients:
  - quantity: 450g
    ingredient: Potatoes
    notes: Scrubbed, chopped into bite-sized pieces
  - quantity: '1'
    ingredient: Cauliflower
    notes: Cut into florets
  - quantity: 3 tbsp
    ingredient: Olive Oil
  - quantity: '1'
    ingredient: Onions
    notes: Finely chopped
  - quantity: '2'
    ingredient: Eggs
    notes: Beaten
  - quantity: 1 tbsp
    ingredient: Chives
    notes: Finely chopped
  - quantity: 200g
    ingredient: Cheddar Cheese
    notes: Grated
  - quantity: 1 tbsp
    ingredient: Paprika
steps:
- steps:
  - text: Pre-heat the oven to 190C
  - text: Boil or steam the potatoes for 15 minutes, and the cauliflower for 10 minutes
  - text: Heat the oil, add the onions and fry until soft
  - text: Combine the potatoes and onions into an ovenproof dish
  - text: Add the eggs, chives, cheese, and paprika
  - text: Bake for 30-40 minutes until the egg has set, and the cheese is bubbling
      and going brown
