identifier: 9ee07d87-0f72-4081-a43a-4c730ffb04d7
title: Grilled Paprika Chicken
section: Main
created_at: '2024-09-27'
tags:
- Chicken
- Meat
- Tomato
equipment:
- Bowl
- Grill
serves: 4
prepTime: PT15M
cookingTime: PT15M
source:
  type: described
  description: One of Mum's recipe books.
ingredients:
- group: Main
  ingredients:
  - quantity: 1 Teaspoon
    ingredient: Paprika
  - quantity: Pinch
    ingredient: Black Pepper
  - quantity: '1'
    ingredient: Lemon
    notes: Large, unwaxed, Juice and grated rind
  - quantity: 2 Tablespoons
    ingredient: Olive Oil
  - quantity: 1 clove
    ingredient: Garlic
    notes: Finely chopped
  - quantity: '4'
    ingredient: Chicken Breasts
    notes: Medium-sized, Cut into bite-sized cubes
- group: To Serve
  ingredients:
  - quantity: '2'
    ingredient: Whole Tomatoes
    notes: Grilled
  - quantity: '4'
    ingredient: Bread Roll
    notes: Crusty
steps:
- steps:
  - text: Heat the grill,
  - text: Mix together the paprika, pepper, lemon, oil and garlic.
  - text: Put the chicken pieces into this mixture and marinate in the fridge for
      10+ minutes.
  - text: Line the grill pan with foil and brush with oil.
  - text: Remove the chicken from the marinade with a slotted spoon and grill for
      10-12 minutes, turning for time to time and basting with the marinade.
