steps:
- title: Preparations
  steps:
  - text: Cook rice,
  - text: Chop onions & slice pepper,
  - text: Chop the tomatoes (just before cooking, they need their juice),
- title: Cooking
  steps:
  - text: Heat butter & oil in a large pan. Add the pepper, onion & cashews and saute
      until the vegetables are just tender,
  - text: Add the tomatoes, rice and garlic to the pan,
  - text: Continue stirring over a gentle heat until the rice is heated through,
