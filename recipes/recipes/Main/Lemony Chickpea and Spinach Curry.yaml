identifier: ff288b6e-36a0-4d51-974a-47ee8eb9b260
title: Lemony Chickpea and Spinach Curry
section: Main
created_at: '2024-09-27'
tags:
- Chickpea
- Curry
- Onion
- Preserved Beans
equipment:
- Frying pan
- Hob
- Pestle and mortar
serves: 4
prepTime: PT20M
cookingTime: PT30M
source:
  type: book
  isbn: '9780993215506'
  page: 270
  description: Riverford Autumn and Winter Veg
description: This is quite a nice curry. The recipe as written here ends up quite
  wet, it works best with rice.
ingredients:
- ingredients:
  - quantity: 1 teaspoon
    ingredient: Cumin Seeds
  - quantity: 1 teaspoon
    ingredient: Coriander Seeds
  - quantity: 1 tablespoon
    ingredient: Sunflower Oil
  - quantity: 400g can
    ingredient: Chickpeas
    notes: ''
  - quantity: '2'
    ingredient: Onions
    notes: finely sliced
  - quantity: 3 Cloves
    ingredient: Garlic
    notes: finely chopped
  - quantity: 5 cm
    ingredient: Ginger
  - quantity: '2'
    ingredient: Fresh Chillies
  - quantity: 1 teaspoon
    ingredient: Ground Turmeric
  - quantity: '10'
    ingredient: Cardamom Pods
    notes: Seeds only
  - quantity: 90ml
    ingredient: Lemon Juice
  - quantity: 400ml
    ingredient: Vegetable Stock
  - quantity: 300g
    ingredient: Spinach
    notes: tough stalks removed and leaves roughly chopped
  - quantity: Large handful
    ingredient: Fresh Coriander
    notes: roughly chopped
  - quantity: Pinch
    ingredient: Salt / Black Pepper
steps:
- steps:
  - text: Soak the chickpeas for a few hours beforehand (they approximately double
      in weight),
  - text: If the chickpeas aren't pre-cooked then they'll need to be cooked for about
      15-25 minutes,
  - text: Make sure the spinach is ready to go. Preparation for this much spinach
      can take a while if the stalks need removing.
  - text: Lightly toast the cumin and coriander seeds in a dry frying pan until you
      just start to smell their aroma, then grind them in a pestle and mortar,
  - text: Heat the oil in a large, heavy-based pan then add the onions,
  - text: Fry gently for 10 minutes, stirring until soft,
  - text: Add the garlic, ginger, coriander, chillies, cumin, coriander, turmeric
      and cardamom then fry, stirring for another 2 minutes,
  - text: Add the lemon juice, stock and chickpeas. Bring to the boil then reduce
      heat and simmer for 15 minutes,
  - text: Stir in the spinach and let it wilt
  - text: Season
  - text: Stir in the chopped coriander,
