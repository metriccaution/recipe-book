title: Slow-Roasted Crispy Pork Belly
section: Main
created_at: '2026-05-18'
tags:
- Complex
- Family Classics
- Meat
- Pork
equipment: []
serves: 5
prepTime: PT5M
cookingTime: PT3H
source:
  type: url
  url: https://www.recipetineats.com/crispy-slow-roasted-pork-belly/
  description: Recipe Tin Eats
description: 'Three tips for juicy meat with crispy crackling:


  1.  Don''t score the skin

  2. Roast low, then finish hot

  3. Keep the pork level with foil balls'
ingredients:
- ingredients:
  - quantity: 1kg
    ingredient: Pork Belly
    notes: Skin-On
  - quantity: 1.5 tsp
    ingredient: Olive Oil
  - quantity: 0.5 tsp
    ingredient: Fennel Powder
  - quantity: 1 tbsp
    ingredient: Salt
  - quantity: 0.25 tsp
    ingredient: Black Pepper
steps:
- steps:
  - text: 'Dry skin overnight: Place pork belly on a plate. Pat skin dry with paper
      towels. Leave uncovered in fridge overnight to dry out the skin.'
  - text: "Preheat oven to 140\xB0C/285\xB0F (120\xB0C fan)."
  - text: 'Season flesh: Drizzle flesh (only) with 1 tsp oil. Sprinkle over 1/2 tsp
      salt, the pepper and fennel powder. Rub all over the flesh, including on the
      sides, being sure you get right into all the cracks and crevices.'
  - text: 'Wrap in foil: Place 2 pieces of foil on a work surface. Put the belly in
      middle of foil, skin side up. Fold the sides in to enclose the belly, forming
      an open box, pinching corners to seal tightly and make it as snug as possible.
      Place meat on a tray.'
  - text: 'Season skin: Pat skin dry with paper towels. Rub with 1/2 tsp oil then
      sprinkle remaining 1/2 tsp salt evenly all over the skin surface, from edge
      to edge.'
  - text: 'Slow roast 2 1/2 hours: Place in the oven and roast for 2 1/2 hours.'
    substeps:
    - text: After 1 1/2 hours, remove and tighten the foil (pork will have shrunk)
    - text: continue cooking. This keeps the pork fat level up as high as possible,
        and the flesh protected so it stays moist.
  - text: "Increase heat: Remove pork from oven, then increase heat to 240\xB0C/465\xB0\
      F (all oven types)."
  - text: 'Level pork: Remove pork from foil and place on a rack set over a tray (using
      rack is best, but optional). Use scrunched up balls of foil stuffed under pork
      to prop up so the skin surface is as level and horizontal as possible.'
  - text: 30 minutes on high heat!
    substeps:
    - text: Place the pork back in the oven for 30 minutes
    - text: Rotate after 15 minutes as needed (**open oven with care as it will be
        smokey**), until the crackling is deep golden, puffy and crispy all over.
    - text: If some patches are browning faster, protect them with foil patches.
  - text: 'Rest 10 minutes: Remove pork from oven. Rest for 10 minutes before slicing.'
  - text: 'Serving: Slice into 2cm / 1"-thick slices using a serrated knife.'
