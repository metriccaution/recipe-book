ingredients:
- ingredients:
  - quantity: '1'
    ingredient: Cauliflower
  - quantity: 500g
    ingredient: Carrots
  - quantity: 200g
    ingredient: Broccoli
  - quantity: 400ml Can
    ingredient: Coconut Milk
  - quantity: 75g
    ingredient: Ground Almonds
  - quantity: 2 cloves
    ingredient: Garlic
  - quantity: 1 tsp
    ingredient: Ginger
  - quantity: 250g
    ingredient: White Rice
  - quantity: 20g
    ingredient: Flaked Almonds
  - quantity: 1 tbsp
    ingredient: Curry Powder
  - quantity: 2 tsp
    ingredient: Cumin Seeds
  - quantity: 1 tsp
