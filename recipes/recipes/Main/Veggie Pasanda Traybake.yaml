steps:
- title: Roast the Veg
  steps:
  - text: "Preheat your oven to 190\xB0C fan."
  - text: Cut the cauliflower and broccoli into florets
  - text: Peel and chop the carrots into 3cm chunks
  - text: Put the veg in a large roasting tin, and drizzle with olive oil, salt, and
      pepper
  - text: Roast in the oven for 25-30 minutes, until just starting to char
- title: Sauce
  steps:
  - text: Grind the spices and mix
  - text: Peel and grate the garlic
  - text: Heat the coconut milk, ground almonds in a saucepan
  - text: Leave to simmer and thicken
- title: Assemble the Curry
  steps:
  - text: Remove the roasting tin from the oven
  - text: Pour over the sauce, and mix well
  - text: Return to the oven for 15 minutes, until it starts to brown
- title: Rice
  steps:
  - text: Add the rice and 500ml of water to a pan
  - text: Bring to a simmer, and boil for 10-12 minutes
- title: Serve
  steps:
  - text: Serve the rice and curry together, sprinkled with the flaked almonds
