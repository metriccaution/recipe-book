identifier: ead4d2c3-e2f8-4ab1-a4ad-e5fb0c2ba26c
title: Mushroom Stroganoff
section: Main
created_at: '2024-09-27'
tags:
- Celery
- Mushroom
- Onion
equipment: []
serves: 2
prepTime: PT10M
cookingTime: PT15M
source:
  type: book
  isbn: '9780954317973'
  page: 166
  description: Vegetarian Nosh For Students
ingredients:
- ingredients:
  - quantity: 1 tbsp
    ingredient: Oil
  - quantity: '1'
    ingredient: Onions
    notes: Chopped finely
  - quantity: 2 sticks
    ingredient: Celery
    notes: Sliced finely
  - quantity: '12'
    ingredient: Mushrooms
    notes: Sliced
  - quantity: 1 tbsp
    ingredient: Plain Flour
  - quantity: 150ml
    ingredient: Vegetable Stock
  - quantity: 1 tbsp
    ingredient: Chives
  - quantity: 2 tbsp
    ingredient: Sour Cream
steps:
- steps:
  - text: Put the oil in the pan and fry the onions and celery until they are transparent.
  - text: Add a little more oil to the pan, add the mushrooms and cook for 1 minute.
  - text: Add the flour to the pan.
  - text: Mix together and then add stock.
  - text: Bring to the boil, then turn down the heat and simmer, uncovered, for 1
      minute.
  - text: Take off the heat and add the soured cream and the chives.
  - text: Season with salt and pepper.
