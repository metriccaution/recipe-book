steps:
- steps:
  - text: Put all ingredients except cashew nuts and salt in a large saucepan and
      simmer gently, uncovered for 10 minutes,
  - text: Add cashew nuts and salt and cook gently for 30 minutes (or until cashews
      are tender),
  - text: Add thick coconut milk and simmer for about 5 minutes,
