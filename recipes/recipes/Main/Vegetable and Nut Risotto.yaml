steps:
- steps:
  - text: Fry the onions and garlic for 2 minutes, add the rice and fry for another
      minute,
  - text: Add about half of the water with stock and wine with the other vegetables,
  - text: Bring to the boil and season well,
  - text: Simmer for about 25-30 minutes,
    substeps:
    - text: The risotto should be kept wet, keep adding stock / wine,
    - text: Regularly stir to break the grains and keep it from sticking,
  - text: Add nuts when serving,
