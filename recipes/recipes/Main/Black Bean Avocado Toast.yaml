identifier: 2a546bbe-2386-4d08-bfda-aaea1ea3860b
title: Black Bean Avocado Toast
section: Main
created_at: '2025-10-03'
tags:
- Avocado
- Preserved Beans
equipment: []
serves: 2
prepTime: PT15M
source:
  type: book
  isbn: '9781787335233'
  description: The Food For Life Cookbook
ingredients:
- ingredients:
  - quantity: '3'
    ingredient: Avocados
  - quantity: '1'
    ingredient: Lime
    notes: juice and zest
  - quantity: 400g can
    ingredient: Black Beans
  - quantity: 15g
    ingredient: Fresh Coriander
  - quantity: 2 tbsp
    ingredient: Pumpkin Seeds
  - quantity: 1 tbsp
    ingredient: Chilli Flakes
  - quantity: 1 tbsp
    ingredient: Olive Oil
steps:
- steps:
  - text: Cut each avocado in half, scoop out the flesh and chop roughly.
  - text: Add the lime zest and juice and mix well.
  - text: In a separate bowl, mash half of the black beans until they are mostly broken
      down.
  - text: Add the remaining beans, coriander, pumpkin seeds, chilli flakes, olive
      oil and avocado to the bowl and mix until well combined.
  - text: Season with salt and pepper.
  - text: Toast the bread and then top with the smashed avocado.
