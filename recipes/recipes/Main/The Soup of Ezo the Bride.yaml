steps:
- title: To Make the Soup
  steps:
  - text: Melt the butter in a soup pan
  - text: Fry the onion until soft
  - text: Add the garlic, fry for a minute
  - text: Add the tomatoes, cumin and half the paprika
  - text: "Stir for a minute, and then add the tomato and Biber Sal\xE7as\u0131"
  - text: Add the lentils, rice and bulgar wheat
  - text: Stir in the stock, and bring to the boil
  - text: Reduce to a simmer, cook for 40 minutes, stirring occasionally
  - text: Season to taste, add water as required
  - text: Heat a little butter in a pan, add the paprika and the mint
  - text: Serve the soup with the minty paprika as a garnish
