  - quantity: 2 tbsp
    ingredient: Tamari
  - quantity: 500g
    ingredient: Baby Spinach
  - quantity: 500ml
    ingredient: Greek Yoghurt
steps:
- steps:
  - text: 'Mix all the ingredients except for: ,Half the coriander, Spinach, 1 garlic
      clove, 2 tbsp of the olive oil, and 1 tbsp of tamari'
  - text: Allow the mixture to marinate for a few hours
  - text: Mix the yoghurt with the remaining coriander and garlic for the sauce
  - text: At the last moment, toss the baby spinach with the reserved oil and tamari,
      along with a squeeze of lemon juice
  - text: To serve, heap the spinach on a plate, spoon the chickpeas on top, and serve
      alongside the yoghurt sauce
