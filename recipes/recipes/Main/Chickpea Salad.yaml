ingredients:
- ingredients:
  - quantity: 2 400g can
    ingredient: Chickpeas
  - quantity: 100g
    ingredient: Onions
  - quantity: '2'
    ingredient: Spring Onions
  - quantity: Small Handful
    ingredient: Parsley
  - quantity: Handful
    ingredient: Fresh Coriander
  - quantity: 1 tbsp
    ingredient: Paprika
  - quantity: 1 tbsp
    ingredient: Cumin Seeds
    notes: Ground
  - quantity: 3 cloves
    ingredient: Garlic
  - quantity: 200ml
