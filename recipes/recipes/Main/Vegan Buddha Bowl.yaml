steps:
- steps:
  - text: Preheat the oven to 220C,
  - text: Boil water and add the quinoa, then simmer for 15 minutes, then keep covered,
  - text: Toss the chickpeas oil and spices until the chickpeas are evenly coated,
  - text: Line a baking tray with parchment paper and bake the chickpeas for 15-20
      minutes,
  - text: Remove from the oven and allow to cool,
  - text: To make the red pepper sauce, add all of the sauce to a blender and blend
      until smooth,
  - text: Assemble all ingredients into the bowls (slice the avocados),
