steps:
- title: Roast Vegetables
  steps:
  - text: "Pre-heat the oven to 230\xB0C."
  - text: Cut the vegetables (squash, celeriac, swede, carrots and parsnips) into
      approximately 2cm cubes.
  - text: Place them and the red onions (cut into sixths vertically) in a large bowl
      along with the herbs, garlic a good seasoning of salt and pepper and olive oil,
      then toss them around so they get a good coating of the herbs.
  - text: Arrange them evenly in a baking tray and place on the highest shelf of the
      oven for about 30 minutes (until they're brown at the edges).
  - text: "Once they're out reduce the temperature to 200\xB0C."
- title: Rice
  steps:
  - text: Begin by warming the frying pan over a medium heat, then add the oil and
      the onions and let them cook for 3-4 minutes (until lightly tinged brown).
  - text: Stir the rice in dry to coat the grains with the oil.
  - text: Add the boiling stock with the salt. Stir once only and cover with the lid
      for 20-25 minutes. Don't remove the lid or stir the rice while it's cooking
      (this causes the rice to go sticky as it breaks up the starches).
- title: Cheese Sauce
  steps:
  - text: Place the milk, flour, butter and a pinch of pepper into a medium saucepan
      and whisk it all together on a gentle heat until smooth.
  - text: Cook on the lowest available heat for 5 minutes.
  - text: Add the cheese and whisk until smooth again. Season with salt, pepper and
      nutmeg.
- title: Combining Everything
  steps:
  - text: When the vegetables are cooked arrange the rice in an ovenproof dish,
  - text: Add the vegetables on top,
  - text: Cover in cheese sauce (try to get it around the vegetables evenly and down
      into the rice).
  - text: Scatter over the remaining cheese.
  - text: "Cook in the oven at 200\xB0C for 20 minutes."
