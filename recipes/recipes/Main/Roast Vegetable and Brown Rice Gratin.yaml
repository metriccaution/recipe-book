title: Roast Vegetable and Brown Rice Gratin
section: Main
created_at: '2024-09-27'
tags:
- Carrot
- Cheese
- Family Classics
- Onion
- Rice
equipment:
- Lidded frying pan (at least 25cm diameter)
- Ovenproof dish (at least 20cm x 15cm)
- Pre-heated oven
- Roasting dish
serves: 3
prepTime: PT30M
cookingTime: PT1H
source:
  type: book
  isbn: '9780563488187'
  description: Delia's Vegetarian Collection
ingredients:
- group: Roast Vegetables
  ingredients:
