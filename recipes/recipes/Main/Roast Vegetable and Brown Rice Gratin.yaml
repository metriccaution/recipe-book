    ingredient: Squash
    notes: peeled weight
  - quantity: 150g
    ingredient: Celeriac
  - quantity: 150g
    ingredient: Swede
  - quantity: 150g
    ingredient: Carrots
  - quantity: 150g
    ingredient: Parsnips
  - quantity: '2'
    ingredient: Red Onions
