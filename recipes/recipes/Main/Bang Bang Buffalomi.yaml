steps:
- steps:
  - text: Fill a medium saucepan with plenty of water. Bring up to the boil, while
      you continue.
  - text: Peel and finely grate 1 tbsp of ginger.
  - text: Peel and grate the garlic.
  - text: Finely grate the zest from half the lime.
  - text: Slice the chilli into thin rings.
  - text: In a bowl, mix the peanut butter, 2 tbsp of soy sauce, the maple syrup and
      the juice from half the lime. Add the ginger, garlic and chilli powder to your
      taste. Gradually add 3 tbsp of water, to loosen it slightly, so it can easily
      coat the noodles later.
  - text: Scrub the carrots, then peel into long ribbons, until you reach the core.
      Prepare a couple of good handfuls, to your liking. Repeat with the courgette,
      discarding the seedy core.
  - text: Thinly slice as much mushrooms as you like to suit your appetite.
  - text: Cut the buffalomi into approx. 2cm chunks.
  - text: Heat a large frying pan. When hot, add the buffalomi (no oil required) and
      fry for approx. 2-3 minutes, then turn them, until they're golden and crisping
      on two sides. Keep a good eye on them. Transfer to a plate when cooked.
  - text: Boil the noodles for 3-4 minutes, until just tender, stirring them often,
      while you continue.
  - text: Heat 1/2 tbsp of oil in the same frying pan.
  - text: Fry the mushrooms for a couple of minutes on a high heat.
  - text: Add the carrot and courgette and fresh chilli to your taste.
  - text: Fry for a further couple of minutes until the veg ribbons have softened
      a little.
  - text: Add the peanut dressing, gently toss to coat and remove from the heat (you
      can add a splash more water to loosen, if needed).
  - text: Check the seasoning and heat levels - add any remaining chilli powder too,
      if you like and haven't used it all up yet.
  - text: Drain the noodles.
  - text: Combine, sprinkle over the lime zest, and serve.
