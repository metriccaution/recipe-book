steps:
- steps:
  - text: Heat 1 tbsp oil in a large saucepan, and saute the onion & cumin until transparent
  - text: Add chopped carrots & potatoes, saute for a couple of minutes
  - text: Add the lentils, garlic (whole) and half the stock
  - text: Bring to the boil, then simmer for 20 minutes, stirring occasionally
  - text: Add the remaining stock, continue to simmer for 20-25 minutes
  - text: Add the remaining seasoning
