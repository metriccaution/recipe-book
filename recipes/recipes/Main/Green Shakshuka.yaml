identifier: 28dd7cc8-fbe6-4e00-88ef-1114093d3794
title: Green Shakshuka
section: Main
created_at: '2026-01-31'
tags:
- Leek
- Preserved Beans
equipment: []
serves: 2
prepTime: PT8M
cookingTime: PT12M
source:
  type: book
  isbn: '9781787335233'
  description: The Food For Life Cookbook
ingredients:
- ingredients:
  - quantity: 2 tbsp
    ingredient: Olive Oil
  - quantity: '1'
    ingredient: Leeks
  - quantity: 2 cloves
    ingredient: Garlic
  - quantity: 1 tbsp
    ingredient: Cumin Seeds
  - quantity: 1/2 tsp
    ingredient: Chilli Flakes
  - quantity: 100g
    ingredient: Kale
  - quantity: 1 can
    ingredient: Borlotti Beans
  - quantity: 3/2 tbsp
    ingredient: Vegetable Stock
  - quantity: 15g
    ingredient: Fresh Coriander
  - quantity: '1'
    ingredient: Lime
steps:
- steps:
  - text: Heat the olive oil in a large frying pan over a medium heat
  - text: "Add the leek and saut\xE9 for 3 minutes until softened."
  - text: Add the garlic, cumin seeds, chilli flakes and a pinch of salt and cook
      for 30 seconds more.
  - text: Turn the heat to high and add the kale, borlotti beans and their liquid,
      vegetable stock and 100ml water.
  - text: Boil rapidly for 3 minutes, stirring once or twice, until the kale has wilted
      and the sauce has thickened and reduced.
  - text: Season to taste.
  - text: Make four wells in the centre of the mixture and crack an egg into each
      one. Reduce the heat to medium, cover the pan with a lid or sheet of foil and
      cook until the whites are set but the yolks are still runny, about 4-5 minutes.
  - text: Scatter over the coriander and serve with a squeeze of lime and some freshly
      ground black pepper.
