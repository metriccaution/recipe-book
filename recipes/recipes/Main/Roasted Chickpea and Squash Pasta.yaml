title: Roasted Chickpea and Squash Pasta
section: Main
created_at: '2024-09-27'
tags:
- Chickpea
- Preserved Beans
equipment:
- Frying pan
- Hob
- Oven
- Potato masher
- Roasting tin
- Saucepan
serves: 2
prepTime: PT15M
cookingTime: PT30M
source:
  type: described
  description: Unknown
ingredients:
- ingredients:
  - quantity: '1'
    ingredient: Squash
    notes: small - about 600g (peeled, deseeded and chopped into 2-3cm chunks)
  - quantity: 1/2 teaspoon
    ingredient: Chilli Flakes
  - quantity: 1/2 teaspoon
    ingredient: Fennel Seeds
  - quantity: 1/2 teaspoon
    ingredient: Cumin Seeds
  - quantity: Pinch
    ingredient: Ground Cinnamon
  - quantity: 4 cloves
    ingredient: Garlic
    notes: finely chopped
  - quantity: 4 tablespoons
    ingredient: Olive Oil
  - quantity: 400g can
    ingredient: Chickpeas
    notes: ''
  - quantity: 200g
    ingredient: Linguine
  - quantity: 50g
    ingredient: Breadcrumbs
  - quantity: 1/2
    ingredient: Lemon
    notes: zested
  - quantity: Small Handful
    ingredient: Parsley
    notes: chopped
  - quantity: 2 tablespoons
    ingredient: Natural Yoghurt
steps:
- steps:
  - text: Preheat the oven to 200C (gas mark 6).
  - text: Toss the squash, chilli flakes, fennel, cumin seeds, cinnamon, 3/4 of the
      garlic and 2 tablespoons of oil in a roasting tin.
  - text: Roast for 20 minutes until the quash is starting to turn golden/soft but
      still is holding its shape.
  - text: Add the chickpeas and roast for another 10 minutes.
  - text: Meanwhile, boil the pasta in salted water until tender, then drain.
  - text: In a frying pan, heat the remaining 2 tablespoons of oil and add the breadcrumbs,
      and remaining garlic.
  - text: Fry for 5-10 minutes until golden then stir in the lemon zest.
  - text: Using a potato masher, crush 1/2 of the butternut squash/chickpea mixture.
  - text: Add the parsley and mix all the components (except breadcrumbs).
  - text: Add the breadcrumbs as seasoning and serve.
