identifier: 58b7cd2c-af15-406e-9dc4-d2a33b91dbbe
title: Spinach and Rice soup
section: Main
created_at: '2026-04-18'
tags:
- Onion
- Rice
- Soup
equipment: []
serves: 3
prepTime: PT15M
cookingTime: PT20M
source:
  type: url
  url: https://miakouppa.com/spinach-and-rice-soup/
  description: Miakouppa
ingredients:
- ingredients:
  - quantity: 30ml
    ingredient: Olive Oil
  - quantity: '1'
    ingredient: Onion
    notes: diced
  - quantity: 2 cloves
    ingredient: Garlic
    notes: diced
  - quantity: 1tsp
    ingredient: Dried Parsley
  - quantity: 1/2 tsp
    ingredient: Thyme
  - quantity: 1/2 tsp
    ingredient: Oregano
  - quantity: 200g
    ingredient: Arborio Rice
  - quantity: 1.5 litres
    ingredient: Vegetable Stock
  - quantity: 150g
    ingredient: Spinach
steps:
- steps:
  - text: Heat the oil over medium heat and add the onions. Fry for 3-5 minutes, until
      the onions are soft and translucent.
  - text: Add the garlic and cook for an additional minute.
  - text: Add the parsley, thyme, oregano, and some salt and pepper.
  - text: Add the rice and stir well.
  - text: Add the stock, and simmer for 20 minutes, stirring occasionally.
  - text: Add the spinach, and cook for a further 5 minutes.
