title: Asparagus With Lemon & Hazelnuts
section: Side
created_at: '2024-09-27'
tags:
- Nuts
equipment: []
serves: 2
prepTime: PT5M
cookingTime: PT10M
source:
  type: described
  description: Abel & Cole
ingredients:
- ingredients:
  - quantity: 25g
    ingredient: Hazelnuts
  - quantity: 400g
    ingredient: Asparagus
  - quantity: 30ml
    ingredient: Lemon Juice
  - quantity: 1 tbsp
    ingredient: Olive Oil
steps:
- steps:
  - text: Fill your kettle and boil it. Finely chop the hazelnuts. Snap the woody
      ends off the asparagus spears-if you bend them, they should snap at the right
      point.
  - text: Warm a pan over a medium heat. When the pan is hot, scatter in the chopped
      hazelnuts. Toast them in the dry pan for 2-4 mins, tossing occasionally, till
      golden and nutty smelling. Tip the toasted hazelnuts into a bowl and set aside.
  - text: Give the pan you used to cook a hazelnuts a quick wipe, then pour in the
      hot water from the kettle. Pop the pan back on the hob and bring the water to
      the boil. When the water is boiling. add the asparagus. Simmer the asparagus
      for 3-4 mins, till tender and bright green. Drain
  - text: While the asparagus is cooking, squeeze the lemon juice into the bowl with
      the hazelnuts. Pour in 1 tbsp olive oil and season with a pinch of salt and
      pepper. Whisk with a fork to combine.
  - text: Transfer the cooked asparagus to a warm serving dish. Spoon over the hazelnut
      and lemon dressing and serve.
