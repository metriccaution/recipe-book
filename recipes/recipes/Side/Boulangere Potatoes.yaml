identifier: 50e7cd49-e9ec-404a-b33f-d8b718f2517e
title: Boulangere Potatoes
section: Side
created_at: '2024-09-27'
tags:
- Onion
- Potato
equipment: []
serves: 3
prepTime: PT15M
cookingTime: PT2H
source:
  type: described
  description: Abel & Cole
ingredients:
- ingredients:
  - quantity: 1.5 kg
    ingredient: Potatoes
  - quantity: 50 g
    ingredient: Butter
  - quantity: '3'
    ingredient: Onions
  - quantity: 2 tsp
    ingredient: Vegetable Stock
  - quantity: Handful
    ingredient: Parsley
  - quantity: 2 tbsp
    ingredient: Olive Oil
steps:
- steps:
  - text: "Preheat your oven to 200\xB0C/Fan 180\xB0C/Gas 6."
  - text: Fill and boil your kettle.
  - text: Tip the vegetable bouillon powder into a heatproof jug and pour in 500ml
      hot water.
  - text: Stir to dissolve the powder. Set aside.
  - text: Lightly grease a 3 ltr ovenproof dish with a little of the butter.
  - text: Peel and thinly slice the onions. Finely chop the parsley stalks and leaves.
  - text: Set a pan on a medium heat and add 2 tbsp olive oil. Melt 25g of the butter.
      then add the sliced onions and the parsley stalks.
  - text: Season with a pinch of salt and pepper, pop a lid on the pan and fry for
      10-15 mins, stirring occasionally. till tender and lightly browned.
  - text: While the onions fry, scrub the potatoes and thinly slice them. You don't
      need to peel the potatoes, but you can if you prefer to
  - text: When the onions are tender and golden, take them off the heat. Layer around
      of the potatoes in the dish. They don't have to be neat-you can arrange them
      in tidy layers or as higgeldy piggeldy as you like. Season generously with salt
      and pepper, then top with 1/3 of the onions. Repeat, layering the potatoes and
      onions till you finish with a layer of potato.
  - text: Pour the stock over the potatoes, then dot the top with the remaining butter
      from the 50g chunk Loosely cover with foil.
  - text: Slide the baking dish into the oven.
  - text: Bake for 1 hour.
  - text: Remove the foil and bake for 30 mins till golden and tender all the way
      through-a skewer inserted into the potatoes should slide through easily.
  - text: The potatoes will be really hot, so let them sit in the dish for 5 mins
      before serving.
