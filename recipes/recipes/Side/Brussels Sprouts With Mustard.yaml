identifier: 56fdb850-2ab6-4c95-a0a0-f35cce92788b
title: Brussels Sprouts With Mustard
section: Side
created_at: '2024-12-23'
tags: []
equipment: []
serves: 4
prepTime: PT30M
cookingTime: PT15M
source:
  type: described
  description: From one of the Christmas recipe selections
description: '**Variation:** if fresh sprouts are not available, use frozen. Or substitute
  green cabbage and vegetable stock. Do not cook the cabbage first: fry the spices,
  then add the greens and continue from there.



  **Tip:** gram flour, sometimes called besan, is a soft, yellow flour made from ground
  chickpeas and is used to thicken dishes. Look for it in supermarkets and Indian
  food shops.'
ingredients:
- ingredients:
  - quantity: 500g
    ingredient: Brussels Sprouts
  - quantity: 1 tbsp
    ingredient: Sunflower Oil
  - quantity: 1/2 tsp
    ingredient: Mustard Seeds
  - quantity: 1/2 tsp
    ingredient: Cumin Seeds
  - quantity: 2 cloves
    ingredient: Garlic
  - quantity: 1/2 tsp
    ingredient: Cayenne Pepper
  - quantity: 1 tbsp
    ingredient: Gram Flour
steps:
- steps:
  - text: Trim the sprouts and cut a cross into each stem end.
  - text: Bring a pan of water to the boil, add the sprouts and return it to the boil.
  - text: Cover and simmer for 2-3 minutes.
  - text: Reserve 150 ml (5 floz) of the cooking liquid and drain off the remainder.
  - text: Heat the oil in a large nonstick saucepan over a medium heat
  - text: "Throw in the mustard seeds \u2014 they will start jumping around so you\
      \ may need to cover the pan briefly until they have settled down."
  - text: Add the cumin, garlic and cayenne pepper in that order
  - text: Reduce the heat to low and stir-fry for 1 minute, or until the garlic begins
      to brown.
  - text: Add the sprouts to the pan, season to taste, stir well, cover and cook for
      2-3 minutes.
  - text: Pour in the reserved sprout stock, increase the heat to medium and simmer
      the mixture, uncovered, until the stock has reduced by half,
  - text: Sprinkle the gram flour evenly over the top, then stir until all the stock
      has been absorbed and the sprouts are coated with a thin sauce.
