title: Kale Crisps
section: Snack
created_at: '2024-09-27'
tags: []
equipment: []
serves: 1
prepTime: PT5M
cookingTime: PT15M
source:
  type: described
  description: Abel & Cole
ingredients:
- ingredients:
  - quantity: 200g
    ingredient: Kale
  - quantity: 3 tbsp
    ingredient: Olive Oil
steps:
- steps:
  - text: Preheat the oven to 160c
  - text: Trim the ribs out of the kale, discarding them
  - text: Toss the kale in the oil, and spread in a single layer on a baking sheet
  - text: Sprinkle with salt
  - text: Bake for 8-12 minutes, until crisp
